<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Financeiro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <canvas id="bg-canvas"></canvas>

    <div class="app-container">
        <!-- Sidebar Interna c/ Claymorphism -->
        <aside class="sidebar">
            <div class="logo-section">
                <div style="width: 46px; min-width: 46px; height: 46px; display: flex; align-items: center; justify-content: center;"><img src="logo.webp" alt="Logo" style="width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 10px rgba(124, 107, 255, 0.5));"></div>
                <span class="logo-text">Performance</span>
            </div>

            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <div class="icon-wrapper"><i data-lucide="bar-chart-3"></i></div>
                    <span class="nav-text">Financeiro</span>
                </a>
                <a href="cartoes.html" class="nav-item">
                    <div class="icon-wrapper"><i data-lucide="credit-card"></i></div>
                    <span class="nav-text">Cartões</span>
                </a>
                <a href="cadastro.html" class="nav-item active">
                    <div class="icon-wrapper"><i data-lucide="file-plus"></i></div>
                    <span class="nav-text">Cadastro</span>
                </a>
                <a href="dados.html" class="nav-item">
                    <div class="icon-wrapper"><i data-lucide="database"></i></div>
                    <span class="nav-text">Meus Dados</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-wrapper">
            <header class="top-header">
                <div class="header-left">
                    <h1>Dashboard <span class="header-divider">|</span> <span class="header-subtitle">Financeiro</span>
                    </h1>
                </div>
                <div class="header-right">
                    <span class="user-name">Usuário</span>
                    <div class="user-avatar">
                        <img src="https://ui-avatars.com/api/?name=Rodrigo&background=2B2B2B&color=fff&rounded=true&bold=true"
                            alt="User">
                    </div>
                </div>
            </header>

            <div class="content-scroll">
                <h2 class="page-title">Cadastro de Dados</h2>

                <div class="tabs-container">
                    <button class="tab-btn active" data-tab="fluxo">Fluxo Financeiro</button>
                    <button class="tab-btn" data-tab="cartao">Cartões</button>
                    <button class="tab-btn" data-tab="metas">Metas</button>
                    <button class="tab-btn" data-tab="invest">Investimentos</button>
                </div>

                <!-- 1. FLUXO FINANCEIRO -->
                <div id="fluxo" class="tab-content active">
                    <div class="card-form">
                        <form id="form-fluxo">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Data</label>
                                    <input type="date" id="fluxo-data" required>
                                </div>
                                <div class="form-group">
                                    <label>Tipo</label>
                                    <div class="toggle-group">
                                        <button type="button" class="toggle-btn receita active"
                                            data-type="Receita">Receita</button>
                                        <button type="button" class="toggle-btn despesa"
                                            data-type="Despesa">Despesa</button>
                                    </div>
                                    <input type="hidden" id="fluxo-tipo" value="Receita">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label>Categoria</label>
                                    <select id="fluxo-categoria" required>
                                        <!-- Preenchido via JS baseado no Tipo -->
                                    </select>
                                </div>
                                <div class="form-group">
                                <label>Subcategoria</label>
                                <input type="text" id="fluxo-subcategoria" list="subs-list" placeholder="Ex: Supermercado..." required>
                                <datalist id="subs-list"></datalist>
                            </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label>Valor (R$)</label>
                                    <input type="number" step="0.01" id="fluxo-valor" required placeholder="0,00">
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Descrição (Opcional)</label>
                                <textarea id="fluxo-desc" rows="3" placeholder="Detalhes da transação..."></textarea>
                            </div>

                            <button type="submit" class="btn-submit">Cadastrar Fluxo</button>
                        </form>
                    </div>
                </div>

                <!-- 2. CARTÃO -->
                <div id="cartao" class="tab-content">
                    <div class="card-form">
                        <form id="form-cartao">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Data da Compra</label>
                                    <input type="date" id="cartao-data" required>
                                </div>
                                <div class="form-group">
                                    <label>Tipo</label>
                                    <div class="toggle-group">
                                        <button type="button" class="toggle-btn primary-toggle"
                                            data-type="Fatura">Cartão / Fatura</button>
                                        <button type="button" class="toggle-btn primary-toggle active"
                                            data-type="Parcela">Compra Parcelada</button>
                                    </div>
                                    <input type="hidden" id="cartao-tipo" value="Parcela">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label>Cartão Utilizado</label>
                                    <select id="cartao-nome" required>
                                        <option value="Cartão 1">Cartão 1</option>
                                        <option value="Cartão 2">Cartão 2</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-row" id="cartao-parcelas-container">
                                <div class="form-group">
                                    <label>Quantidade de Parcelas</label>
                                    <input type="number" id="cartao-qtd-parcelas" min="2" max="48" value="2">
                                </div>
                                <div class="form-group">
                                    <label>Valor da Parcela (R$)</label>
                                    <input type="number" step="0.01" id="cartao-valor-parcela" placeholder="0,00">
                                </div>
                            </div>

                            <div class="form-row" id="cartao-fatura-container" style="display: none;">
                                <div class="form-group">
                                    <label>Valor da Fatura (R$)</label>
                                    <input type="number" step="0.01" id="cartao-valor-fatura" placeholder="0,00">
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Descrição</label>
                                <textarea id="cartao-desc" rows="2"
                                    placeholder="Nome do estabelecimento, etc."></textarea>
                            </div>

                            <button type="submit" class="btn-submit">Registrar Cartão</button>
                        </form>
                    </div>
                </div>

                <!-- 3. METAS -->
                <div id="metas" class="tab-content">
                    <div class="card-form">
                        <form id="form-metas">
                            <h3 style="margin-bottom: 16px;">Adicionar Nova Meta</h3>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Nome da Meta</label>
                                    <input type="text" id="meta-nome" required placeholder="Ex: Viagem, Carro...">
                                </div>
                                <div class="form-group">
                                    <label>Valor Total da Meta (R$)</label>
                                    <input type="number" step="0.01" id="meta-valor" required placeholder="0,00">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label>Data Limite</label>
                                    <input type="date" id="meta-datalimite" required>
                                </div>
                                <div class="form-group">
                                    <label>Valor Inicial Já Guardado (R$)</label>
                                    <input type="number" step="0.01" id="meta-valor-inicial" value="0.00">
                                </div>
                            </div>

                            <button type="submit" class="btn-submit">Criar Meta</button>
                        </form>

                        <hr style="border:0; border-top:1px solid rgba(0,0,0,0.1); margin: 32px 0;">

                        <form id="form-metas-update">
                            <h3 style="margin-bottom: 16px;">Atualizar Saldo da Meta</h3>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Selecione a Meta</label>
                                    <select id="meta-update-select" required>
                                        <option value="">Sem metas cadastradas</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Valor a Adicionar (R$)</label>
                                    <input type="number" step="0.01" id="meta-update-valor" required placeholder="0,00">
                                </div>
                            </div>
                            <button type="submit" class="btn-submit">Atualizar Meta</button>
                        </form>
                    </div>
                </div>

                <!-- 4. INVESTIMENTOS -->
                <div id="invest" class="tab-content">
                    <div class="card-form">
                        <form id="form-invest">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Data do Investimento</label>
                                    <input type="date" id="invest-data" required>
                                </div>
                                <div class="form-group">
                                    <label>Tipo</label>
                                    <div class="toggle-group">
                                        <button type="button" class="toggle-btn primary-toggle rendafixa active"
                                            data-type="Renda Fixa">Renda Fixa</button>
                                        <button type="button" class="toggle-btn primary-toggle rendavariavel"
                                            data-type="Renda Variável">Renda Var.</button>
                                    </div>
                                    <input type="hidden" id="invest-tipo" value="Renda Fixa">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label>Ativo (Investimento)</label>
                                    <select id="invest-ativo" required>
                                        <!-- Preenchido via JS (CDB, Tesouro VS Ações, FIIs) -->
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Corretora/Instituição (Opcional)</label>
                                    <input type="text" id="invest-inst" placeholder="Ex: XP, NuInvest...">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label>Valor Investido Atual (Aporte R$)</label>
                                    <input type="number" step="0.01" id="invest-aporte" placeholder="0,00">
                                </div>
                                <div class="form-group">
                                    <label>Valor Total Acumulado/Atual (R$) (Opcional)</label>
                                    <input type="number" step="0.01" id="invest-acumulado" placeholder="0,00">
                                </div>
                            </div>

                            <button type="submit" class="btn-submit">Registrar Investimento</button>
                        </form>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
