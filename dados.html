<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Dados | Financeiro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <canvas id="bg-canvas"></canvas>

    <div class="app-container">
        <!-- Sidebar Interna c/ Claymorphism -->
        <aside class="sidebar">
            <div class="logo-section">
                <div style="width: 46px; min-width: 46px; height: 46px; display: flex; align-items: center; justify-content: center;"><img src="logo.webp" alt="Logo" style="width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 10px rgba(124, 107, 255, 0.5));"></div>
                <span class="logo-text">Performance</span>
            </div>

            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <div class="icon-wrapper"><i data-lucide="bar-chart-3"></i></div>
                    <span class="nav-text">Financeiro</span>
                </a>
                <a href="cartoes.html" class="nav-item">
                    <div class="icon-wrapper"><i data-lucide="credit-card"></i></div>
                    <span class="nav-text">Cartões</span>
                </a>
                <a href="cadastro.html" class="nav-item">
                    <div class="icon-wrapper"><i data-lucide="file-plus"></i></div>
                    <span class="nav-text">Cadastro</span>
                </a>
                <a href="dados.html" class="nav-item active">
                    <div class="icon-wrapper"><i data-lucide="database"></i></div>
                    <span class="nav-text">Meus Dados</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-wrapper">
            <header class="top-header">
                <div class="header-left">
                    <h1>Dashboard <span class="header-divider">|</span> <span class="header-subtitle">Financeiro</span>
                    </h1>
                </div>
                <div class="header-right">
                    <span class="user-name">Usuário</span>
                    <div class="user-avatar">
                        <img src="https://ui-avatars.com/api/?name=Rodrigo&background=2B2B2B&color=fff&rounded=true&bold=true"
                            alt="User">
                    </div>
                </div>
            </header>

            <div class="content-scroll">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <h2 class="page-title" style="margin-bottom: 0;">Meus Registros</h2>
                    <div class="control-actions">
                        <button class="btn-outline" onclick="document.getElementById('input-import-csv').click()"><i data-lucide="upload" style="width:16px"></i> Importar CSV (Fluxo)</button>
                        <input type="file" id="input-import-csv" style="display:none" accept=".csv">
                        <button class="btn-outline" id="btn-export"><i data-lucide="download" style="width:16px"></i> Exportar Tudo (CSV)</button>
                    </div>
                </div>

                <div class="tabs-container">
                    <button class="tab-btn active" data-tab="list-fluxo">Fluxo Financeiro</button>
                    <button class="tab-btn" data-tab="list-cartao">Cartões</button>
                    <button class="tab-btn" data-tab="list-metas">Metas</button>
                    <button class="tab-btn" data-tab="list-invest">Investimentos</button>
                </div>

                <!-- 1. FLUXO FINANCEIRO LISTA -->
                <div id="list-fluxo" class="tab-content active">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Data</th>
                                    <th>Categoria (Sub)</th>
                                    <th>Descrição</th>
                                    <th>Valor</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tbody-fluxo">
                                <!-- Dados preenchidos via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 2. CARTÕES LISTA -->
                <div id="list-cartao" class="tab-content">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Data</th>
                                    <th>Tipo</th>
                                    <th>Cartão</th>
                                    <th>Info</th>
                                    <th>Valor</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tbody-cartao">
                                <!-- Dados preenchidos via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 3. METAS LISTA -->
                <div id="list-metas" class="tab-content">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Meta</th>
                                    <th>Progresso</th>
                                    <th>Acumulado</th>
                                    <th>Objetivo</th>
                                    <th>Data Limite</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tbody-metas">
                                <!-- Dados preenchidos via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 4. INVESTIMENTOS LISTA -->
                <div id="list-invest" class="tab-content">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Data</th>
                                    <th>Ativo</th>
                                    <th>Instituição</th>
                                    <th>Aporte</th>
                                    <th>Acumulado</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tbody-invest">
                                <!-- Dados preenchidos via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
