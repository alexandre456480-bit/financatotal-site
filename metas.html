<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Metas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js"></script>
</head>

<body>
    <canvas id="bg-canvas"></canvas>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-section">
                <div style="width: 46px; min-width: 46px; height: 46px; display: flex; align-items: center; justify-content: center;"><img src="logo.webp" alt="Logo" style="width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 10px rgba(124, 107, 255, 0.5));"></div>
                <span class="logo-text">Performance</span>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <div class="icon-wrapper"><i data-lucide="bar-chart-3"></i></div>
                    <span class="nav-text">Financeiro</span>
                </a>
                <a href="cartoes.html" class="nav-item">
                    <div class="icon-wrapper"><i data-lucide="credit-card"></i></div>
                    <span class="nav-text">Cartões</span>
                </a>
                <a href="metas.html" class="nav-item active">
                    <div class="icon-wrapper"><i data-lucide="goal"></i></div>
                    <span class="nav-text">Metas</span>
                </a>
                <a href="investimentos.html" class="nav-item">
                    <div class="icon-wrapper"><i data-lucide="landmark"></i></div>
                    <span class="nav-text">Investimentos</span>
                </a>
                <a href="cadastro.html" class="nav-item">
                    <div class="icon-wrapper"><i data-lucide="file-plus"></i></div>
                    <span class="nav-text">Cadastro</span>
                </a>
                <a href="dados.html" class="nav-item">
                    <div class="icon-wrapper"><i data-lucide="database"></i></div>
                    <span class="nav-text">Meus Dados</span>
                </a>
            </nav>
        </aside>

        <main class="main-wrapper">
            <header class="top-header">
                <div class="header-left">
                    <h1>Dashboard <span class="header-divider">|</span> <span class="header-subtitle">Metas</span></h1>
                </div>
                <div class="header-right">
                    <span class="user-name">Usuário</span>
                    <div class="user-avatar">
                        <img src="https://ui-avatars.com/api/?name=Rodrigo&background=2B2B2B&color=fff&rounded=true&bold=true" alt="Rodrigo">
                    </div>
                </div>
            </header>

            <div class="content-scroll dash-layout">
                <h2 class="page-title" style="margin-bottom: 0;">Resumo de Metas</h2>
                
                <!-- KPI Cirulares (Neon) -->
                <div class="kpi-row" style="grid-template-columns: repeat(3, 1fr);">
                    <div class="clay-card" style="display:flex; flex-direction:column; align-items:center;">
                        <h4 style="margin-bottom: 10px; color: var(--text-light); text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px;">Maior Objetivo</h4>
                        <div id="chart-kpi-meta1" style="width: 100%; height: 220px;"></div>
                    </div>
                    <div class="clay-card" style="display:flex; flex-direction:column; align-items:center;">
                        <h4 style="margin-bottom: 10px; color: var(--text-light); text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px;">2º Maior Objetivo</h4>
                        <div id="chart-kpi-meta2" style="width: 100%; height: 220px;"></div>
                    </div>
                    <div class="clay-card" style="display:flex; flex-direction:column; align-items:center;">
                        <h4 style="margin-bottom: 10px; color: var(--text-light); text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px;">Mais Próxima da Conclusão</h4>
                        <div id="chart-kpi-meta3" style="width: 100%; height: 220px;"></div>
                    </div>
                </div>

                <!-- Gráficos Principais -->
                <div class="chart-row-2">
                    <div class="chart-card glass-card">
                        <div class="chart-head">
                            <h3>Valor Total em Metas Acumulado</h3>
                        </div>
                        <div id="chart-metas-evo" style="width:100%;height:350px;"></div>
                    </div>
                    <div class="chart-card glass-card">
                        <div class="chart-head">
                            <h3>Top 10 Metas Cadastradas</h3>
                        </div>
                        <div id="chart-metas-top10" style="width:100%;height:350px;"></div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script src="dashboard.js"></script>
</body>

</html>
